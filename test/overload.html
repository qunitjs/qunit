<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>overload</title>
    <link rel="stylesheet" href="../src/qunit.css">
    <script>
    var _globalError;
    window.onerror = function (error) {
      _globalError = error;
      // Cancel, don't report to browser and grunt-contrib-qunit
      return true;
    };
    </script>
    <script src="../qunit/qunit.js"></script>
    <script>
    var _qunitFirst = window.QUnit;
    </script>
    <script src="../qunit/qunit.js"></script>
    <script>
    QUnit.module('overload', function () {
      QUnit.test('verify', function (assert) {
        assert.strictEqual(_globalError, undefined, 'no error');
        assert.strictEqual(QUnit, _qunitFirst, 'single identity');
      });
    });
    </script>
  </head>
  <body>
    <div id="qunit"></div>
  </body>
</html>
